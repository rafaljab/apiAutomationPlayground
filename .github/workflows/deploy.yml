name: Deploy

on:
  push:
    branches:
      - master
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      NEW_VERSION: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Bump version
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          NEW_VERSION=$(python3 -c "
          import re
          with open('pyproject.toml', 'r', encoding='utf-8') as f:
              content = f.read()
          match = re.search(r'version\s*=\s*\"(\d+)\.(\d+)\.(\d+)\"', content)
          if match:
              major, minor, patch = int(match.group(1)), int(match.group(2)), int(match.group(3))
              new_version = f'{major}.{minor}.{patch + 1}'
              new_content = content[:match.start()] + f'version = \"{new_version}\"' + content[match.end():]
              with open('pyproject.toml', 'w', encoding='utf-8') as f:
                  f.write(new_content)
              print(new_version)
          else:
              raise ValueError('Version string not found')
          ")
          echo "Bumping version to $NEW_VERSION"
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          
          uv lock
          git add pyproject.toml uv.lock
          git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
          git push
          git push --tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        run: |
          gh release create "v$NEW_VERSION" --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger PythonAnywhere Webhook Deployment
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          echo "Triggering deployment webhook..."
          HTTP_STATUS=$(curl -s -o deploy_response.txt -w "%{http_code}" -X POST \
            "https://apiautomationplayground.pythonanywhere.com/api/deploy/" \
            -H "X-Deploy-Token: ${DEPLOY_TOKEN}")
            
          cat deploy_response.txt
          
          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "\nDeployment webhook failed with status $HTTP_STATUS"
            exit 1
          fi
          echo "\nWebhook triggered successfully!"

      - name: Reload PythonAnywhere Webapp
        uses: umuttopalak/pythonanywhere-deploy-action@v1.1.2
        with:
          host: 'www.pythonanywhere.com'
          username: ${{ vars.PA_USERNAME }}
          api_token: ${{ secrets.PA_API_TOKEN }}
          domain_name: 'apiautomationplayground.pythonanywhere.com'
